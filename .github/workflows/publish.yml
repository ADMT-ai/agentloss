name: publish

# Publishes the `agentaudit` package to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token to store. Configure a trusted
# publisher for the project at https://pypi.org/manage/account/publishing/ first.

on:
  release:
    types: [published]

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
