name: ci

# The regression net: unit tests + every offline oracle eval (detectors, calibration,
# gateway, packs, dogfood) on each push/PR. Deterministic — no network, no API keys.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e . pytest
      - run: python -m pytest -q
